name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight:
    name: Release Preflight
    runs-on: ubuntu-latest
    env:
      AUTO_UPDATE_BASE_URL: ${{ secrets.AUTO_UPDATE_BASE_URL }}
      AUTO_UPDATE_S3_ACCESS_KEY_ID: ${{ secrets.AUTO_UPDATE_S3_ACCESS_KEY_ID }}
      AUTO_UPDATE_S3_BUCKET: ${{ secrets.AUTO_UPDATE_S3_BUCKET }}
      AUTO_UPDATE_S3_ENDPOINT: ${{ secrets.AUTO_UPDATE_S3_ENDPOINT }}
      AUTO_UPDATE_S3_REGION: ${{ secrets.AUTO_UPDATE_S3_REGION }}
      AUTO_UPDATE_S3_SECRET_ACCESS_KEY: ${{ secrets.AUTO_UPDATE_S3_SECRET_ACCESS_KEY }}
    outputs:
      publish_ready: ${{ steps.check.outputs.publish_ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: check
        shell: bash
        run: |
          desktop_version=$(node -p "require('./apps/desktop/package.json').version")
          ref_name="${GITHUB_REF_NAME:-}"

          if [[ "$ref_name" == v* ]]; then
            tag_version="${ref_name#v}"

            if [[ "$tag_version" != "$desktop_version" ]]; then
              echo "::error::Tag version ($tag_version) must match apps/desktop/package.json version ($desktop_version)."
              exit 1
            fi
          fi

          missing=()
          for key in AUTO_UPDATE_BASE_URL AUTO_UPDATE_S3_BUCKET AUTO_UPDATE_S3_REGION AUTO_UPDATE_S3_ENDPOINT AUTO_UPDATE_S3_ACCESS_KEY_ID AUTO_UPDATE_S3_SECRET_ACCESS_KEY; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "publish_ready=false" >> "$GITHUB_OUTPUT"
            echo "[desktop-release] preflight=skip"
            echo "[desktop-release] missing=${missing[*]}"
            echo "::warning::Skipping desktop release because required secrets are missing: ${missing[*]}"
            exit 0
          fi

          echo "publish_ready=true" >> "$GITHUB_OUTPUT"
          echo "[desktop-release] preflight=ready"

  publish:
    name: Publish (${{ matrix.label }})
    needs: preflight
    if: needs.preflight.outputs.publish_ready == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS arm64
            arch: arm64
          - os: macos-14
            label: macOS x64
            arch: x64
          - os: windows-latest
            label: Windows x64
            arch: x64
    runs-on: ${{ matrix.os }}
    env:
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      AUTO_UPDATE_BASE_URL: ${{ secrets.AUTO_UPDATE_BASE_URL }}
      AUTO_UPDATE_KEEP_RELEASES: ${{ secrets.AUTO_UPDATE_KEEP_RELEASES }}
      AUTO_UPDATE_S3_ACCESS_KEY_ID: ${{ secrets.AUTO_UPDATE_S3_ACCESS_KEY_ID }}
      AUTO_UPDATE_S3_BUCKET: ${{ secrets.AUTO_UPDATE_S3_BUCKET }}
      AUTO_UPDATE_S3_ENDPOINT: ${{ secrets.AUTO_UPDATE_S3_ENDPOINT }}
      AUTO_UPDATE_S3_FOLDER: ${{ secrets.AUTO_UPDATE_S3_FOLDER }}
      AUTO_UPDATE_S3_FORCE_PATH_STYLE: ${{ secrets.AUTO_UPDATE_S3_FORCE_PATH_STYLE }}
      AUTO_UPDATE_S3_OMIT_ACL: ${{ secrets.AUTO_UPDATE_S3_OMIT_ACL }}
      AUTO_UPDATE_S3_REGION: ${{ secrets.AUTO_UPDATE_S3_REGION }}
      AUTO_UPDATE_S3_SECRET_ACCESS_KEY: ${{ secrets.AUTO_UPDATE_S3_SECRET_ACCESS_KEY }}
      AUTO_UPDATE_S3_SESSION_TOKEN: ${{ secrets.AUTO_UPDATE_S3_SESSION_TOKEN }}
      MARKETING_ORIGIN: https://turborepo-scaffold.vercel.app
      NEXT_PUBLIC_PRODUCT_WEB_URL: https://turborepo-scaffold-web.vercel.app
    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Log publish context
        shell: bash
        run: |
          echo "[desktop-release] matrix.os=${{ matrix.os }}"
          echo "[desktop-release] matrix.arch=${{ matrix.arch }}"
          echo "[desktop-release] DESKTOP_FORGE_COMMAND=publish"
          for key in AUTO_UPDATE_BASE_URL AUTO_UPDATE_S3_BUCKET AUTO_UPDATE_S3_REGION AUTO_UPDATE_S3_ENDPOINT AUTO_UPDATE_S3_ACCESS_KEY_ID AUTO_UPDATE_S3_SECRET_ACCESS_KEY AUTO_UPDATE_S3_FOLDER AUTO_UPDATE_S3_FORCE_PATH_STYLE AUTO_UPDATE_S3_OMIT_ACL AUTO_UPDATE_KEEP_RELEASES MARKETING_ORIGIN NEXT_PUBLIC_PRODUCT_WEB_URL APPLE_SIGNING_IDENTITY APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID APPLE_CERTIFICATE_P12_BASE64 APPLE_CERTIFICATE_PASSWORD; do
            if [ -n "${!key}" ]; then
              echo "[desktop-release] $key=present"
            else
              echo "[desktop-release] $key=missing"
            fi
          done

      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_P12_BASE64 != '' && env.APPLE_CERTIFICATE_PASSWORD != ''
        shell: bash
        run: |
          CERT_PATH="$RUNNER_TEMP/desktop-signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/desktop-signing.keychain-db"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[ "]//g')
          security default-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build web app
        run: bun run --cwd apps/web build

      - id: publish_desktop
        name: Publish desktop artifacts
        continue-on-error: true
        run: bun run --cwd apps/desktop publish -- --arch=${{ matrix.arch }}

      - name: Inspect packaged outputs
        if: always()
        run: |
          node -e "const fs=require('fs'); const path=require('path'); const root=path.join(process.cwd(),'apps','desktop','out','make'); const walk=(dir)=>{ if(!fs.existsSync(dir)){ console.log('[desktop-release] no make outputs at', dir); return; } for (const entry of fs.readdirSync(dir,{withFileTypes:true})) { const full=path.join(dir,entry.name); console.log(path.relative(process.cwd(),full)); if(entry.isDirectory()) walk(full); } }; walk(root);"

      - name: Fail if publish failed
        if: steps.publish_desktop.outcome == 'failure'
        run: exit 1

  abort_multipart_uploads:
    name: Abort stale multipart uploads
    needs: [preflight, publish]
    if: needs.preflight.outputs.publish_ready == 'true'
    continue-on-error: true
    runs-on: ubuntu-latest
    env:
      AUTO_UPDATE_MULTIPART_MAX_AGE_MINUTES: 15
      AUTO_UPDATE_S3_ACCESS_KEY_ID: ${{ secrets.AUTO_UPDATE_S3_ACCESS_KEY_ID }}
      AUTO_UPDATE_S3_BUCKET: ${{ secrets.AUTO_UPDATE_S3_BUCKET }}
      AUTO_UPDATE_S3_ENDPOINT: ${{ secrets.AUTO_UPDATE_S3_ENDPOINT }}
      AUTO_UPDATE_S3_FOLDER: ${{ secrets.AUTO_UPDATE_S3_FOLDER }}
      AUTO_UPDATE_S3_FORCE_PATH_STYLE: ${{ secrets.AUTO_UPDATE_S3_FORCE_PATH_STYLE }}
      AUTO_UPDATE_S3_REGION: ${{ secrets.AUTO_UPDATE_S3_REGION }}
      AUTO_UPDATE_S3_SECRET_ACCESS_KEY: ${{ secrets.AUTO_UPDATE_S3_SECRET_ACCESS_KEY }}
      AUTO_UPDATE_S3_SESSION_TOKEN: ${{ secrets.AUTO_UPDATE_S3_SESSION_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Abort stale multipart uploads
        run: node ./scripts/abort-r2-multipart-uploads.mjs

  cleanup:
    name: Cleanup old releases
    needs: [preflight, publish, abort_multipart_uploads]
    if: needs.preflight.outputs.publish_ready == 'true' && needs.publish.result == 'success'
    continue-on-error: true
    runs-on: ubuntu-latest
    env:
      AUTO_UPDATE_KEEP_RELEASES: ${{ secrets.AUTO_UPDATE_KEEP_RELEASES }}
      AUTO_UPDATE_S3_ACCESS_KEY_ID: ${{ secrets.AUTO_UPDATE_S3_ACCESS_KEY_ID }}
      AUTO_UPDATE_S3_BUCKET: ${{ secrets.AUTO_UPDATE_S3_BUCKET }}
      AUTO_UPDATE_S3_ENDPOINT: ${{ secrets.AUTO_UPDATE_S3_ENDPOINT }}
      AUTO_UPDATE_S3_FOLDER: ${{ secrets.AUTO_UPDATE_S3_FOLDER }}
      AUTO_UPDATE_S3_FORCE_PATH_STYLE: ${{ secrets.AUTO_UPDATE_S3_FORCE_PATH_STYLE }}
      AUTO_UPDATE_S3_REGION: ${{ secrets.AUTO_UPDATE_S3_REGION }}
      AUTO_UPDATE_S3_SECRET_ACCESS_KEY: ${{ secrets.AUTO_UPDATE_S3_SECRET_ACCESS_KEY }}
      AUTO_UPDATE_S3_SESSION_TOKEN: ${{ secrets.AUTO_UPDATE_S3_SESSION_TOKEN }}
    steps:
      - name: Check cleanup config
        shell: bash
        run: |
          if [ -z "$AUTO_UPDATE_KEEP_RELEASES" ]; then
            echo "AUTO_UPDATE_KEEP_RELEASES is not set, skipping cleanup."
            exit 0
          fi

          if ! [[ "$AUTO_UPDATE_KEEP_RELEASES" =~ ^[0-9]+$ ]] || [ "$AUTO_UPDATE_KEEP_RELEASES" -lt 1 ]; then
            echo "::error::AUTO_UPDATE_KEEP_RELEASES must be an integer >= 1"
            exit 1
          fi

          for key in AUTO_UPDATE_S3_BUCKET AUTO_UPDATE_S3_REGION AUTO_UPDATE_S3_ENDPOINT AUTO_UPDATE_S3_ACCESS_KEY_ID AUTO_UPDATE_S3_SECRET_ACCESS_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::$key is required for cleanup"
              exit 1
            fi
          done

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prune old release artifacts
        run: node ./scripts/prune-r2-releases.mjs
