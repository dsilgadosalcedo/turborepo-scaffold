name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight:
    name: Release Preflight
    runs-on: ubuntu-latest
    env:
      AUTO_UPDATE_BASE_URL: ${{ secrets.AUTO_UPDATE_BASE_URL }}
      AUTO_UPDATE_S3_ACCESS_KEY_ID: ${{ secrets.AUTO_UPDATE_S3_ACCESS_KEY_ID }}
      AUTO_UPDATE_S3_BUCKET: ${{ secrets.AUTO_UPDATE_S3_BUCKET }}
      AUTO_UPDATE_S3_ENDPOINT: ${{ secrets.AUTO_UPDATE_S3_ENDPOINT }}
      AUTO_UPDATE_S3_REGION: ${{ secrets.AUTO_UPDATE_S3_REGION }}
      AUTO_UPDATE_S3_SECRET_ACCESS_KEY: ${{ secrets.AUTO_UPDATE_S3_SECRET_ACCESS_KEY }}
    outputs:
      publish_ready: ${{ steps.check.outputs.publish_ready }}
    steps:
      - id: check
        shell: bash
        run: |
          missing=()
          for key in AUTO_UPDATE_BASE_URL AUTO_UPDATE_S3_BUCKET AUTO_UPDATE_S3_REGION AUTO_UPDATE_S3_ENDPOINT AUTO_UPDATE_S3_ACCESS_KEY_ID AUTO_UPDATE_S3_SECRET_ACCESS_KEY; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "publish_ready=false" >> "$GITHUB_OUTPUT"
            echo "[desktop-release] preflight=skip"
            echo "[desktop-release] missing=${missing[*]}"
            echo "::warning::Skipping desktop release because required secrets are missing: ${missing[*]}"
            exit 0
          fi

          echo "publish_ready=true" >> "$GITHUB_OUTPUT"
          echo "[desktop-release] preflight=ready"

  publish:
    name: Publish (${{ matrix.label }})
    needs: preflight
    if: needs.preflight.outputs.publish_ready == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS arm64
            arch: arm64
          - os: macos-14
            label: macOS x64
            arch: x64
          - os: windows-latest
            label: Windows x64
            arch: x64
    runs-on: ${{ matrix.os }}
    env:
      AUTO_UPDATE_BASE_URL: ${{ secrets.AUTO_UPDATE_BASE_URL }}
      AUTO_UPDATE_KEEP_RELEASES: ${{ secrets.AUTO_UPDATE_KEEP_RELEASES }}
      AUTO_UPDATE_S3_ACCESS_KEY_ID: ${{ secrets.AUTO_UPDATE_S3_ACCESS_KEY_ID }}
      AUTO_UPDATE_S3_BUCKET: ${{ secrets.AUTO_UPDATE_S3_BUCKET }}
      AUTO_UPDATE_S3_ENDPOINT: ${{ secrets.AUTO_UPDATE_S3_ENDPOINT }}
      AUTO_UPDATE_S3_FOLDER: ${{ secrets.AUTO_UPDATE_S3_FOLDER }}
      AUTO_UPDATE_S3_FORCE_PATH_STYLE: ${{ secrets.AUTO_UPDATE_S3_FORCE_PATH_STYLE }}
      AUTO_UPDATE_S3_OMIT_ACL: ${{ secrets.AUTO_UPDATE_S3_OMIT_ACL }}
      AUTO_UPDATE_S3_REGION: ${{ secrets.AUTO_UPDATE_S3_REGION }}
      AUTO_UPDATE_S3_SECRET_ACCESS_KEY: ${{ secrets.AUTO_UPDATE_S3_SECRET_ACCESS_KEY }}
      AUTO_UPDATE_S3_SESSION_TOKEN: ${{ secrets.AUTO_UPDATE_S3_SESSION_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Log publish context
        shell: bash
        run: |
          echo "[desktop-release] matrix.os=${{ matrix.os }}"
          echo "[desktop-release] matrix.arch=${{ matrix.arch }}"
          echo "[desktop-release] DESKTOP_FORGE_COMMAND=publish"
          for key in AUTO_UPDATE_BASE_URL AUTO_UPDATE_S3_BUCKET AUTO_UPDATE_S3_REGION AUTO_UPDATE_S3_ENDPOINT AUTO_UPDATE_S3_ACCESS_KEY_ID AUTO_UPDATE_S3_SECRET_ACCESS_KEY AUTO_UPDATE_S3_FOLDER AUTO_UPDATE_S3_FORCE_PATH_STYLE AUTO_UPDATE_S3_OMIT_ACL AUTO_UPDATE_KEEP_RELEASES; do
            if [ -n "${!key}" ]; then
              echo "[desktop-release] $key=present"
            else
              echo "[desktop-release] $key=missing"
            fi
          done

      - name: Build web app
        run: bun run --cwd apps/web build

      - name: Publish desktop artifacts
        run: bun run --cwd apps/desktop publish -- --arch=${{ matrix.arch }}

  cleanup:
    name: Cleanup old releases
    needs: [preflight, publish]
    if: needs.preflight.outputs.publish_ready == 'true' && needs.publish.result == 'success'
    continue-on-error: true
    runs-on: ubuntu-latest
    env:
      AUTO_UPDATE_KEEP_RELEASES: ${{ secrets.AUTO_UPDATE_KEEP_RELEASES }}
      AUTO_UPDATE_S3_ACCESS_KEY_ID: ${{ secrets.AUTO_UPDATE_S3_ACCESS_KEY_ID }}
      AUTO_UPDATE_S3_BUCKET: ${{ secrets.AUTO_UPDATE_S3_BUCKET }}
      AUTO_UPDATE_S3_ENDPOINT: ${{ secrets.AUTO_UPDATE_S3_ENDPOINT }}
      AUTO_UPDATE_S3_FOLDER: ${{ secrets.AUTO_UPDATE_S3_FOLDER }}
      AUTO_UPDATE_S3_FORCE_PATH_STYLE: ${{ secrets.AUTO_UPDATE_S3_FORCE_PATH_STYLE }}
      AUTO_UPDATE_S3_REGION: ${{ secrets.AUTO_UPDATE_S3_REGION }}
      AUTO_UPDATE_S3_SECRET_ACCESS_KEY: ${{ secrets.AUTO_UPDATE_S3_SECRET_ACCESS_KEY }}
      AUTO_UPDATE_S3_SESSION_TOKEN: ${{ secrets.AUTO_UPDATE_S3_SESSION_TOKEN }}
    steps:
      - name: Check cleanup config
        shell: bash
        run: |
          if [ -z "$AUTO_UPDATE_KEEP_RELEASES" ]; then
            echo "AUTO_UPDATE_KEEP_RELEASES is not set, skipping cleanup."
            exit 0
          fi

          if ! [[ "$AUTO_UPDATE_KEEP_RELEASES" =~ ^[0-9]+$ ]] || [ "$AUTO_UPDATE_KEEP_RELEASES" -lt 1 ]; then
            echo "::error::AUTO_UPDATE_KEEP_RELEASES must be an integer >= 1"
            exit 1
          fi

          for key in AUTO_UPDATE_S3_BUCKET AUTO_UPDATE_S3_REGION AUTO_UPDATE_S3_ENDPOINT AUTO_UPDATE_S3_ACCESS_KEY_ID AUTO_UPDATE_S3_SECRET_ACCESS_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::$key is required for cleanup"
              exit 1
            fi
          done

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prune old release artifacts
        run: node ./scripts/prune-r2-releases.mjs
