name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS arm64
            arch: arm64
          - os: macos-14
            label: macOS x64
            arch: x64
          - os: windows-latest
            label: Windows x64
            arch: x64
    runs-on: ${{ matrix.os }}
    env:
      AUTO_UPDATE_BASE_URL: ${{ secrets.AUTO_UPDATE_BASE_URL }}
      AUTO_UPDATE_KEEP_RELEASES: ${{ secrets.AUTO_UPDATE_KEEP_RELEASES }}
      AUTO_UPDATE_S3_ACCESS_KEY_ID: ${{ secrets.AUTO_UPDATE_S3_ACCESS_KEY_ID }}
      AUTO_UPDATE_S3_BUCKET: ${{ secrets.AUTO_UPDATE_S3_BUCKET }}
      AUTO_UPDATE_S3_ENDPOINT: ${{ secrets.AUTO_UPDATE_S3_ENDPOINT }}
      AUTO_UPDATE_S3_FOLDER: ${{ secrets.AUTO_UPDATE_S3_FOLDER }}
      AUTO_UPDATE_S3_FORCE_PATH_STYLE: ${{ secrets.AUTO_UPDATE_S3_FORCE_PATH_STYLE }}
      AUTO_UPDATE_S3_OMIT_ACL: ${{ secrets.AUTO_UPDATE_S3_OMIT_ACL }}
      AUTO_UPDATE_S3_REGION: ${{ secrets.AUTO_UPDATE_S3_REGION }}
      AUTO_UPDATE_S3_SECRET_ACCESS_KEY: ${{ secrets.AUTO_UPDATE_S3_SECRET_ACCESS_KEY }}
      AUTO_UPDATE_S3_SESSION_TOKEN: ${{ secrets.AUTO_UPDATE_S3_SESSION_TOKEN }}
    steps:
      - name: Check required secrets
        shell: bash
        run: |
          missing=0
          for key in AUTO_UPDATE_BASE_URL AUTO_UPDATE_S3_BUCKET AUTO_UPDATE_S3_REGION AUTO_UPDATE_S3_ENDPOINT AUTO_UPDATE_S3_ACCESS_KEY_ID AUTO_UPDATE_S3_SECRET_ACCESS_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::$key is missing"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        run: bun --cwd apps/web run build

      - name: Publish desktop artifacts
        run: bun --cwd apps/desktop run publish -- --arch=${{ matrix.arch }}

  cleanup:
    name: Cleanup old releases
    needs: publish
    runs-on: ubuntu-latest
    env:
      AUTO_UPDATE_KEEP_RELEASES: ${{ secrets.AUTO_UPDATE_KEEP_RELEASES }}
      AUTO_UPDATE_S3_ACCESS_KEY_ID: ${{ secrets.AUTO_UPDATE_S3_ACCESS_KEY_ID }}
      AUTO_UPDATE_S3_BUCKET: ${{ secrets.AUTO_UPDATE_S3_BUCKET }}
      AUTO_UPDATE_S3_ENDPOINT: ${{ secrets.AUTO_UPDATE_S3_ENDPOINT }}
      AUTO_UPDATE_S3_FOLDER: ${{ secrets.AUTO_UPDATE_S3_FOLDER }}
      AUTO_UPDATE_S3_FORCE_PATH_STYLE: ${{ secrets.AUTO_UPDATE_S3_FORCE_PATH_STYLE }}
      AUTO_UPDATE_S3_REGION: ${{ secrets.AUTO_UPDATE_S3_REGION }}
      AUTO_UPDATE_S3_SECRET_ACCESS_KEY: ${{ secrets.AUTO_UPDATE_S3_SECRET_ACCESS_KEY }}
      AUTO_UPDATE_S3_SESSION_TOKEN: ${{ secrets.AUTO_UPDATE_S3_SESSION_TOKEN }}
    steps:
      - name: Check cleanup config
        shell: bash
        run: |
          if [ -z "$AUTO_UPDATE_KEEP_RELEASES" ]; then
            echo "AUTO_UPDATE_KEEP_RELEASES is not set, skipping cleanup."
            exit 0
          fi

          if ! [[ "$AUTO_UPDATE_KEEP_RELEASES" =~ ^[0-9]+$ ]] || [ "$AUTO_UPDATE_KEEP_RELEASES" -lt 1 ]; then
            echo "::error::AUTO_UPDATE_KEEP_RELEASES must be an integer >= 1"
            exit 1
          fi

          for key in AUTO_UPDATE_S3_BUCKET AUTO_UPDATE_S3_REGION AUTO_UPDATE_S3_ENDPOINT AUTO_UPDATE_S3_ACCESS_KEY_ID AUTO_UPDATE_S3_SECRET_ACCESS_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::$key is required for cleanup"
              exit 1
            fi
          done

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prune old release artifacts
        run: node ./scripts/prune-r2-releases.mjs
